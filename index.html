<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه هوشمند کلاس‌های قرآنی شمس‌العلوم ایرانشهر</title>
    <style>
        :root{--primary:#0d3b66;--gold:#c9a84c;--teal:#0d7377;--danger:#dc2626;--success:#059669;--warning:#d97706}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Tahoma,sans-serif;background:#f5f0e1;min-height:100vh;color:#1e293b;direction:rtl;line-height:1.7}
        .splash{position:fixed;inset:0;background:linear-gradient(135deg,#ffffff 0%,#f5f0e1 50%,#e8e0cc 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s}
        .splash.hide{opacity:0;pointer-events:none}
        .splash-ring{position:absolute;border-radius:50%;border:2px solid transparent;animation:ringSpin 4s linear infinite}
        .splash-ring:nth-child(1){width:180px;height:180px;border-top-color:#c9a84c;border-right-color:#0d3b66}
        .splash-ring:nth-child(2){width:210px;height:210px;border-top-color:#0d7377;border-left-color:#c9a84c;animation-duration:5s;animation-direction:reverse}
        .splash-ring:nth-child(3){width:240px;height:240px;border-top-color:#c9a84c;border-bottom-color:#0d3b66;animation-duration:6s}
        @keyframes ringSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .dot-bounce{width:10px;height:10px;border-radius:50%;display:inline-block}
        .dot-bounce:nth-child(1){background:#0d3b66;animation:bounce 0.6s infinite}
        .dot-bounce:nth-child(2){background:#c9a84c;animation:bounce 0.6s 0.15s infinite}
        .dot-bounce:nth-child(3){background:#0d7377;animation:bounce 0.6s 0.3s infinite}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-card{background:white;border-radius:20px;padding:35px 30px;width:100%;max-width:430px;box-shadow:0 20px 60px rgba(0,0,0,0.1);border:2px solid rgba(201,168,76,0.3)}
        .app-container{display:flex;flex-direction:column;min-height:100vh}
        .topbar{background:white;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
        .horizontal-nav{background:white;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;align-items:center;gap:4px;overflow-x:auto;white-space:nowrap;position:sticky;top:57px;z-index:29}
        .horizontal-nav-item{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#475569;border-bottom:2px solid transparent;transition:all 0.2s;background:none;border:none;font-family:inherit}
        .horizontal-nav-item:hover{color:var(--primary);background:#f1f5f9}
        .horizontal-nav-item.active{color:var(--primary);font-weight:600;border-bottom-color:var(--primary)}
        .content{flex:1;padding:24px;overflow-y:auto}
        .card{background:white;border-radius:16px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.04);border:1px solid #e2e8f0;margin-bottom:18px}
        .card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
        .card-header h3{font-size:17px;color:var(--primary);font-weight:700}
        .dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
        .key-box{background:white;border-radius:18px;padding:28px 18px;cursor:pointer;transition:all 0.3s;text-align:center;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,0.03);min-height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
        .key-box:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,0.1);border-color:var(--gold)}
        .key-box .key-icon{font-size:42px}.key-box .key-title{font-size:16px;font-weight:700;color:var(--primary)}
        .table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0}
        table{width:100%;border-collapse:collapse;min-width:650px;font-size:13px}
        th{background:#f8fafc;color:var(--primary);font-weight:600;font-size:11px;padding:11px 10px;text-align:right;border-bottom:2px solid #e2e8f0;white-space:nowrap}
        td{padding:10px;text-align:right;border-bottom:1px solid #f1f5f9}tr:hover td{background:#f8fafc}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;font-weight:500;font-size:13px;border:none;cursor:pointer;transition:all 0.2s;font-family:inherit;white-space:nowrap}
        .btn-primary{background:var(--primary);color:white}.btn-primary:hover{background:#0a2d4d}
        .btn-gold{background:var(--gold);color:white}.btn-gold:hover{background:#b8943f}
        .btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}
        .btn-warning{background:var(--warning);color:white}.btn-info{background:var(--teal);color:white}
        .btn-outline{background:white;border:1px solid #cbd5e1;color:#475569}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
        .btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}.btn-xs{padding:3px 7px;font-size:10px;border-radius:5px}
        .btn-block{width:100%;justify-content:center}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
        .badge-green{background:#d1fae5;color:#065f46}.badge-red{background:#fee2e2;color:#991b1b}
        .badge-orange{background:#fef3c7;color:#92400e}.badge-blue{background:#dbeafe;color:#1e40af}
        .badge-gold{background:#fef9e7;color:#7d6608}
        .form-group{margin-bottom:12px}.form-group label{display:block;font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px}
        input,select,textarea{width:100%;padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:all 0.2s;background:white}
        input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,59,102,0.08)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
        .modal-overlay{display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,0.4);align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal-box{background:white;border-radius:16px;padding:24px;width:90%;max-width:550px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.2);animation:modalIn 0.3s ease}
        @keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8}
        .toast{position:fixed;bottom:24px;left:24px;z-index:100;padding:12px 22px;border-radius:10px;color:white;font-weight:500;font-size:13px;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
        .divider{height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:14px 0}
        @media(max-width:1024px){.dashboard-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:768px){.dashboard-grid{grid-template-columns:1fr 1fr;gap:14px}.key-box{min-height:140px;padding:18px 12px}.form-row{grid-template-columns:1fr}.content{padding:14px}.horizontal-nav{padding:0 12px}.horizontal-nav-item{padding:8px 10px;font-size:11px}}
        @media(max-width:480px){.dashboard-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div class="splash" id="splashScreen">
    <div style="position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center">
        <div class="splash-ring"></div><div class="splash-ring"></div><div class="splash-ring"></div>
        <svg width="120" height="120" viewBox="0 0 200 200" style="position:relative;z-index:1"><circle cx="100" cy="100" r="95" fill="none" stroke="#c9a84c" stroke-width="3"/><circle cx="100" cy="100" r="85" fill="none" stroke="#0d3b66" stroke-width="1" stroke-dasharray="6,4"/><rect x="55" y="45" width="90" height="110" rx="4" fill="#0d3b66" stroke="#c9a84c" stroke-width="1.5"/><line x1="100" y1="45" x2="100" y2="155" stroke="#c9a84c" stroke-width="1.5"/><text x="78" y="115" text-anchor="middle" font-size="30" fill="white" font-weight="bold">ش</text></svg>
    </div>
    <h1 style="font-size:22px;font-weight:700;color:#0d3b66;margin-top:20px;">سامانه هوشمند کلاس‌های قرآنی</h1>
    <h2 style="font-size:18px;font-weight:700;color:#c9a84c;margin-top:6px;">شمس‌العلوم ایرانشهر</h2>
    <p style="color:#64748b;margin-top:10px;">تحت مدیریت مولوی محمد براهویی</p>
    <div style="margin-top:24px;display:flex;gap:12px"><span class="dot-bounce"></span><span class="dot-bounce"></span><span class="dot-bounce"></span></div>
</div>

<div class="login-page" id="loginPage">
    <div class="login-card">
        <div style="text-align:center;margin-bottom:20px;">
            <svg width="70" height="70" viewBox="0 0 200 200" style="margin:0 auto;display:block;"><circle cx="100" cy="100" r="92" fill="none" stroke="#c9a84c" stroke-width="2"/><rect x="58" y="48" width="84" height="104" rx="4" fill="#0d3b66" stroke="#c9a84c" stroke-width="1"/><line x1="100" y1="48" x2="100" y2="152" stroke="#c9a84c" stroke-width="1"/><text x="78" y="112" text-anchor="middle" font-size="28" fill="white" font-weight="bold">ش</text></svg>
            <h2 style="font-size:18px;font-weight:700;color:#0d3b66;margin-top:8px;">شمس‌العلوم ایرانشهر</h2>
            <p style="font-size:12px;color:#64748b;">ورود به سامانه</p>
            <div class="divider"></div>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group"><label>نقش کاربری</label><select id="loginRole" onchange="document.getElementById('teacherFields').style.display=this.value==='teacher'?'block':'none'; document.getElementById('parentFields').style.display=this.value==='parent'?'block':'none';" required><option value="teacher">👨‍🏫 مربی / مدیر</option><option value="parent">👨‍👩‍👧 ولی دانش‌آموز</option></select></div>
            <div id="teacherFields"><div class="form-group"><label>نام کاربری</label><input type="text" id="tUser" placeholder="نام کاربری"></div><div class="form-group"><label>رمز عبور</label><input type="password" id="tPass" placeholder="••••••••"></div></div>
            <div id="parentFields" style="display:none;"><div class="form-group"><label>کد ورود</label><input type="text" id="pCode" placeholder="کد ۶ رقمی" maxlength="6"></div></div>
            <button type="submit" class="btn btn-gold btn-block" style="padding:12px;font-size:15px;">🔑 ورود</button>
        </form>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="toast" id="toast"></div>
    <div class="app-container">
        <header class="topbar">
            <div style="display:flex;align-items:center;gap:12px;">
                <svg width="36" height="36" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="#c9a84c" stroke-width="1.5"/><rect x="60" y="50" width="80" height="100" rx="3" fill="#0d3b66" stroke="#c9a84c" stroke-width="1"/><text x="78" y="110" text-anchor="middle" font-size="26" fill="white" font-weight="bold">ش</text></svg>
                <div><h1 style="font-size:18px;color:var(--primary);">شمس‌العلوم ایرانشهر</h1><p style="font-size:10px;color:#94a3b8;" id="userRoleDisplay"></p></div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;"><span id="headerUserName"></span></div>
        </header>
        <nav class="horizontal-nav" id="horizontalNav"></nav>
        <main class="content" id="content"></main>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"><div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="divider"></div><div id="modalBody"></div></div></div>

<script>
// ==================== GOOGLE APPS SCRIPT CONNECTION ====================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXrstP7lhxMoJJQTXucDT0MF0MgXunQ7Vozy-7l1coyt7pxEHK6pRZasba71Ciytc4/exec";

let currentUser = null;
let currentPage = 'dashboard';
let appData = { students: [], teachers: [], classes: [], parentCodes: [], dailyReports: [], messages: [], courses: [], gradesConfig: [], settings: {}, grades: [] };

// === ۱. تابع بارگذاری کامل داده‌ها از گوگل‌شیت ===
async function loadData() {
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL);
    const data = await response.json();
    if (data && !data.error) {
      appData = data;
      if (!appData.students) appData.students = [];
      if (!appData.teachers) appData.teachers = [];
      if (!appData.classes) appData.classes = [];
      if (!appData.parentCodes) appData.parentCodes = [];
      if (!appData.dailyReports) appData.dailyReports = [];
      if (!appData.messages) appData.messages = [];
      if (!appData.courses) appData.courses = [];
      if (!appData.grades) appData.grades = [];
      console.log("اطلاعات با موفقیت از گوگل‌شیت دریافت شد.");
    }
  } catch (error) {
    console.error("خطا در بارگذاری داده‌ها از گوگل:", error);
  } finally {
    renderApp();
  }
}

// === ۲. تابع ذخیره کامل داده‌ها در گوگل‌شیت ===
async function saveData() {
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify(appData)
    });
  
    const result = await response.json();
    if (result && result.status === "success") {
       console.log("تغییرات با موفقیت در گوگل‌شیت همگام‌سازی شد.");
    } else {
       console.error("خطای سرور گوگل:", result ? result.message : "پاسخ نامعتبر");
    }
  } catch (error) {
    console.error("خطا در ارسال داده به گوگل اسکریپت:", error);
    alert("به دلیل اختلال اینترنت، ذخیره در سرور انجام نشد اما در مرورگر شما موقتاً ثبت شد.");
  } finally {
    renderApp();
  }
}

function renderApp() {
  if (currentUser) {
    navigate(currentPage);
  }
}

function handleLogin(event) {
    event.preventDefault();
    const role = document.getElementById('loginRole').value;
    if (role === 'teacher') {
        const u = document.getElementById('tUser').value.trim();
        const p = document.getElementById('tPass').value.trim();
        const t = appData.teachers.find(x => x.un === u && x.pw === p);
        if (t) {
            currentUser = t;
            enterApp();
        } else {
            showToast('نام کاربری یا رمز عبور اشتباه است', 'error');
        }
    } else {
        const code = document.getElementById('pCode').value.trim();
        // ❌ کد قبلی شما: const pc = appData.parentCodes.find(x => x.code === code);
        // ✅ کد اصلاح شده با دو مساوی:
        const pc = appData.parentCodes.find(x => x.code == code);
       
        if (pc) {
            const s = appData.students.find(x => x.id == pc.studentId);
            if (s) {
                currentUser = { role: 'parent', sid: s.id, sname: s.fn + ' ' + s.ln };
                enterApp();
            } else {
                showToast('دانش‌آموز یافت نشد', 'error');
            }
        } else {
            showToast('کد ورود نامعتبر است', 'error');
        }
    }
}

function enterApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userRoleDisplay').textContent = currentUser.role === 'admin' ? '👑 مدیر' : currentUser.role === 'teacher' ? '👨‍🏫 مربی' : '👨‍👩‍👧 ولی';
    document.getElementById('headerUserName').textContent = currentUser.role === 'parent' ? currentUser.sname : currentUser.fn + ' ' + currentUser.ln;
    buildNav();
    navigate('dashboard');
}

function handleLogout() {
    location.reload();
}

function buildNav() {
    const items = currentUser.role === 'parent' ? [
        { p: 'dashboard', e: '🏠', l: 'داشبورد' }, { p: 'pdaily', e: '📖', l: 'گزارش روزانه' }, { p: 'pmsg', e: '📨', l: 'پیام‌ها' }
    ] : [
        { p: 'dashboard', e: '🏠', l: 'داشبورد' }, { p: 'students', e: '👥', l: 'قرآن‌آموزان' }, { p: 'teachers', e: '👨‍🏫', l: 'مربیان' },
        { p: 'classes', e: '🏫', l: 'کلاس‌ها' }, { p: 'courses', e: '📚', l: 'دروس' }, { p: 'gradeLevels', e: '📊', l: 'پایه‌ها' },
        { p: 'attendance', e: '📋', l: 'حضور' }, { p: 'grades', e: '📝', l: 'نمرات' }, { p: 'dailyReport', e: '📖', l: 'گزارش روزانه' },
        { p: 'report-card', e: '🏆', l: 'کارنامه' }, { p: 'messages', e: '📤', l: 'پیام‌ها' }
    ];
    if (currentUser.role === 'admin') items.push({ p: 'settings', e: '⚙️', l: 'تنظیمات' });
    items.push({ p: 'logout', e: '🚪', l: 'خروج' });
    document.getElementById('horizontalNav').innerHTML = items.map(i => i.p === 'logout' ? `<button class="horizontal-nav-item" onclick="handleLogout()">${i.e} ${i.l}</button>` : `<button class="horizontal-nav-item" data-page="${i.p}" onclick="navigate('${i.p}')">${i.e} ${i.l}</button>`).join('');
}

function navigate(page) {
    currentPage = page;
    document.querySelectorAll('.horizontal-nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    document.getElementById('content').innerHTML = '<p style="text-align:center;padding:30px;">در حال بارگذاری...</p>';
    const pages = { dashboard, students, teachers, classes, courses, gradeLevels, attendance, grades, dailyReport, 'report-card': reportCard, messages, settings, pdash: parentDash, pdaily: parentDaily, pmsg: parentMsg };
    if (pages[page]) pages[page]();
}

function dashboard() {
    if (currentUser.role === 'parent') return parentDash();
    const keys = [{ p: 'students', e: '👥', t: 'قرآن‌آموزان' }, { p: 'teachers', e: '👨‍🏫', t: 'مربیان' }, { p: 'classes', e: '🏫', t: 'کلاس‌ها' }, { p: 'courses', e: '📚', t: 'دروس' }, { p: 'gradeLevels', e: '📊', t: 'پایه‌ها' }, { p: 'attendance', e: '📋', t: 'حضور و غیاب' }, { p: 'grades', e: '📝', t: 'ثبت نمرات' }, { p: 'dailyReport', e: '📖', t: 'گزارش روزانه' }, { p: 'report-card', e: '🏆', t: 'کارنامه' }, { p: 'messages', e: '📤', t: 'ارسال پیام' }];
    document.getElementById('content').innerHTML = `<div class="dashboard-grid">${keys.map(k => `<div class="key-box" onclick="navigate('${k.p}')"><div class="key-icon">${k.e}</div><div class="key-title">${k.t}</div></div>`).join('')}</div>`;
}

function parentDash() {
    const reps = appData.dailyReports.filter(r => r.studentId == currentUser.sid);
    document.getElementById('content').innerHTML = `<div class="card text-center"><h2>${currentUser.sname}</h2></div><div class="dashboard-grid"><div class="key-box" onclick="navigate('pdaily')"><div class="key-icon">📖</div><div class="key-title">گزارش روزانه</div><div class="badge badge-blue">${reps.length} گزارش</div></div><div class="key-box" onclick="navigate('pmsg')"><div class="key-icon">📨</div><div class="key-title">پیام‌ها</div></div></div>`;
}

function parentDaily() {
    const reps = appData.dailyReports.filter(r => r.studentId == currentUser.sid);
    document.getElementById('content').innerHTML = `<div class="card"><h3>📖 گزارش روزانه ${currentUser.sname}</h3>${reps.length === 0 ? '<p>گزارشی ثبت نشده</p>' : reps.reverse().map(r => `<div class="card" style="background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:18px;margin-top:16px;"><h4>📅 ${r.date}</h4><p>یادگیری: ${r.learnRate}%</p><p>${r.status}</p><p>📝 ${r.homework||''}</p><p>💬 ${r.note||''}</p></div>`).join('')}</div>`;
}

function parentMsg() {
    const ms = appData.messages.filter(m => m.studentId == currentUser.sid);
    document.getElementById('content').innerHTML = `<div class="card"><h3>📨 پیام‌ها</h3>${ms.length === 0 ? '<p>پیامی نیست</p>' : ms.reverse().map(m => `<div class="card"><p>${m.text}</p><small>${m.date}</small></div>`).join('')}</div>`;
}

function students() {
    const st = appData.students, pc = appData.parentCodes;
    document.getElementById('content').innerHTML = `<div class="card"><div class="card-header"><h3>قرآن‌آموزان (${st.length} نفر)</h3><button class="btn btn-primary btn-sm" onclick="openStudentModal()">+ افزودن</button></div><div class="table-wrap"><table><thead><tr><th>ردیف</th><th>کد</th><th>نام</th><th>تلفن</th><th>کلاس</th><th>کد والد</th></tr></thead><tbody>${st.map((s,i)=>{const cls=appData.classes.find(c=>c.id==s.classId);const p=pc.find(x=>x.studentId==s.id);return`<tr><td>${i+1}</td><td>${s.code}</td><td>${s.fn} ${s.ln}</td><td>${s.ph}</td><td>${cls?cls.name:'-'}</td><td>${p?p.code:'ندارد'} <button class="btn btn-info btn-xs" onclick="genCode(${s.id})">🔑</button></td></tr>`;}).join('')}</tbody></table></div></div>`;
}

function openStudentModal(id) {
    const s = id ? appData.students.find(x => x.id == id) : null;
    openModal(s ? 'ویرایش' : 'افزودن', `<form onsubmit="saveStudent(event,${id||0})"><div class="form-row"><div class="form-group"><label>نام</label><input id="sfn" value="${s?.fn||''}" required></div><div class="form-group"><label>نام خانوادگی</label><input id="sln" value="${s?.ln||''}" required></div></div><div class="form-row"><div class="form-group"><label>تلفن</label><input id="sph" value="${s?.ph||''}"></div><div class="form-group"><label>کلاس</label><select id="scl"><option value="">بدون کلاس</option>${appData.classes.map(c=>`<option value="${c.id}" ${s?.classId==c.id?'selected':''}>${c.name}</option>`).join('')}</select></div></div><div class="form-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">انصراف</button><button type="submit" class="btn btn-primary">ذخیره</button></div></form>`);
}

async function saveStudent(e, id) {
    e.preventDefault();
    const data = { fn: document.getElementById('sfn').value, ln: document.getElementById('sln').value, ph: document.getElementById('sph').value, classId: parseInt(document.getElementById('scl').value) || 0 };
    if (id) {
        const i = appData.students.findIndex(x => x.id == id);
        appData.students[i] = { ...appData.students[i], ...data };
    } else {
        data.id = genId(appData.students);
        data.code = String(140200 + data.id).padStart(6, '0');
        appData.students.push(data);
    }
    await saveData();
    closeModal();
    students();
    showToast(id ? 'ویرایش شد' : 'اضافه شد');
}

async function genCode(sid) {
    let code;
    do {
        code = Math.floor(100000 + Math.random() * 900000).toString();
    } while (appData.parentCodes.find(x => x.code === code));
    appData.parentCodes.push({ code, studentId: sid });
    await saveData();
    students();
    showToast(`کد والدین: ${code}`, 'info');
}

function gradeLevels() {
    if (!appData.gradesConfig) appData.gradesConfig = [{ id: 1, name: 'مقدماتی', levels: 'مقدماتی ۱,مقدماتی ۲,مقدماتی ۳' }, { id: 2, name: 'متوسطه', levels: 'متوسطه ۱,متوسطه ۲' }, { id: 3, name: 'پیشرفته', levels: 'پیشرفته ۱,پیشرفته ۲,پیشرفته ۳' }];
    document.getElementById('content').innerHTML = `<div class="card"><div class="card-header"><h3>پایه‌های تحصیلی</h3><button class="btn btn-primary btn-sm" onclick="openGrp()">+ افزودن گروه</button></div>${appData.gradesConfig.map(g => { const levels = g.levels ? g.levels.split(',') : []; return `<div class="card" style="margin-bottom:10px;"><div class="flex justify-between items-center mb-3"><h4 style="color:#0d3b66;">${g.name}</h4><div class="flex gap-2"><button class="btn btn-warning btn-xs" onclick="editGrp(${g.id})">✏️</button><button class="btn btn-danger btn-xs" onclick="delGrp(${g.id})">🗑️</button></div></div><div class="flex flex-wrap gap-2 mb-3">${levels.map(l => `<span class="badge badge-gold" style="margin:2px">${l.trim()} <span style="cursor:pointer;color:red" onclick="remLev(${g.id},'${l.trim()}')">×</span></span>`).join('')}</div><div class="flex gap-2"><input type="text" id="nl_${g.id}" placeholder="پایه جدید..." style="max-width:180px;"><button class="btn btn-outline btn-sm" onclick="addLev(${g.id})">+ افزودن</button></div></div>`; }).join('')}</div>`;
}

function openGrp() {
    openModal('گروه جدید', `<form onsubmit="saveGrp(event)"><div class="form-group"><label>نام</label><input id="ggn" required></div><div class="form-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">انصراف</button><button type="submit" class="btn btn-primary">ایجاد</button></div></form>`);
}

async function saveGrp(e) {
    e.preventDefault();
    const n = document.getElementById('ggn').value.trim();
    if (appData.gradesConfig.find(g => g.name === n)) { showToast('تکراری', 'warning'); return; }
    appData.gradesConfig.push({ id: genId(appData.gradesConfig), name: n, levels: '' });
    await saveData();
    closeModal();
    gradeLevels();
    showToast('ایجاد شد');
}

async function editGrp(id) {
    const g = appData.gradesConfig.find(x => x.id == id);
    const n = prompt('نام جدید:', g.name);
    if (n && n.trim()) { g.name = n.trim(); await saveData(); gradeLevels(); showToast('ویرایش شد'); }
}

async function delGrp(id) {
    if (confirm('حذف؟')) { appData.gradesConfig = appData.gradesConfig.filter(g => g.id != id); await saveData(); gradeLevels(); showToast('حذف شد'); }
}

async function addLev(gid) {
    const inp = document.getElementById('nl_' + gid);
    const n = inp.value.trim();
    if (!n) return;
    const g = appData.gradesConfig.find(x => x.id == gid);
    const levels = g.levels ? g.levels.split(',').map(l => l.trim()) : [];
    if (levels.includes(n)) { showToast('تکراری', 'warning'); return; }
    levels.push(n);
    g.levels = levels.join(',');
    await saveData();
    gradeLevels();
    showToast('اضافه شد');
}

async function remLev(gid, levelName) {
    if (!confirm(`حذف "${levelName}"؟`)) return;
    const g = appData.gradesConfig.find(x => x.id == gid);
    const levels = g.levels.split(',').map(l => l.trim()).filter(l => l !== levelName);
    g.levels = levels.join(',');
    await saveData();
    gradeLevels();
    showToast('حذف شد');
}

function showReportCard() {
    const sid = parseInt(document.getElementById('rcStudent').value);

    const grd = (appData.grades||[]).filter(g => g.studentId == sid);

}

function sendWA() {
    const t = document.getElementById('mText').value;
    const s = appData.students.find(x => x.id == document.getElementById('mStudent').value);
    if (s?.ph) { let p = s.ph.replace(/^0+/, ''); if (!p.startsWith('98')) p = '98' + p; window.open(`https://wa.me/${p}?text=${encodeURIComponent(t)}`, '_blank'); }
}

function settings() {
    const s = appData.settings || {};
    document.getElementById('content').innerHTML = `<div class="card" style="max-width:600px;margin:0 auto;"><h3>تنظیمات</h3><form onsubmit="saveSet(event)"><div class="form-group"><label>نام مدرسه</label><input id="setSN" value="${s.sname||''}" required></div><div class="form-group"><label>نام مدیر</label><input id="setMN" value="${s.mname||''}" required></div><div class="form-group"><label>سال تحصیلی</label><input id="setYR" value="${s.year||''}"></div><button type="submit" class="btn btn-primary">💾 ذخیره</button></form></div>`;
}

async function saveSet(e) {
    e.preventDefault();
    appData.settings = { sname: document.getElementById('setSN').value, mname: document.getElementById('setMN').value, year: document.getElementById('setYR').value };
    await saveData();
    showToast('ذخیره شد');
}

function genId(arr) {
    if (!arr || arr.length === 0) return 1;
    return Math.max(...arr.map(x => x.id || 0)) + 1;
}

function openModal(title, bodyHtml) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = type === 'error' ? 'var(--danger)' : type === 'warning' ? 'var(--warning)' : type === 'info' ? 'var(--teal)' : 'var(--success)';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

window.addEventListener('DOMContentLoaded', () => {
    loadData();
    setTimeout(() => {
        document.getElementById('splashScreen').classList.add('hide');
    }, 1500);
});
</script>
</body>
</html>
